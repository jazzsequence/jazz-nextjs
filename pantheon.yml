api_version: 1

# Quicksilver scripts for automated cache management
workflows:
  # Clear cache after code deployment
  deploy:
    after:
      - type: webphp
        description: Clear Pantheon edge cache on deployment
        script: private/scripts/clear_cache.php

  # Clear cache after code sync
  sync_code:
    after:
      - type: webphp
        description: Clear Pantheon edge cache after sync
        script: private/scripts/clear_cache.php

# Platform-specific configurations for Next.js
platform:
  nextjs:
    # Node.js version (matches .nvmrc)
    node_version: 24.13.0

    # Build command
    build_command: npm run build

    # Install command
    install_command: npm ci --quiet --no-fund --no-audit
