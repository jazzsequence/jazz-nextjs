name: Test on Pantheon

# GitHub Pages Setup Required:
# 1. Go to repository Settings → Pages
# 2. Set Source to "Deploy from a branch"
# 3. Select branch "gh-pages" and folder "/ (root)"
# 4. Save
# 5. Playwright reports will be available at:
#    https://{username}.github.io/{repo}/reports/{run_id}
#
# Note: peaceiris/actions-gh-pages pushes to gh-pages branch
# The first deployment will create this branch automatically

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

permissions:
  contents: write  # Required for GitHub Pages deployment
  pages: write
  id-token: write

jobs:
  test:
    name: Test deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            ENV_NAME="pr-${PR_NUM}"
            BASE_URL="https://pr-${PR_NUM}-${PANTHEON_SITE_NAME}.pantheonsite.io"
          else
            ENV_NAME="dev"
            BASE_URL="https://dev-${PANTHEON_SITE_NAME}.pantheonsite.io"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

      - name: Setup PHP (required for Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install and authenticate Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Wait for Pantheon build and deployment to complete
        id: wait
        run: |
          echo "Waiting for Pantheon deployment to complete..."
          echo "Site: ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}"
          echo "URL: ${{ steps.env.outputs.base_url }}"

          # Verify Terminus authentication
          if ! terminus auth:whoami > /dev/null 2>&1; then
            echo "❌ Terminus not authenticated"
            exit 1
          fi

          echo "✓ Authenticated with Terminus"

          # Get current commit SHA for reference
          COMMIT_SHA="${{ github.sha }}"
          echo "Monitoring deployment for commit: ${COMMIT_SHA:0:7}"

          # Monitor Pantheon workflow status via Terminus CLI
          # Max 10 minutes (builds can take up to 10 minutes per user feedback)
          MAX_ATTEMPTS=60
          SLEEP_TIME=10
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Check $ATTEMPT of $MAX_ATTEMPTS..."

            # Get workflow list for this environment using Terminus CLI
            # Format: JSON output with workflow details including status and description
            WORKFLOWS=$(terminus workflow:list ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --format=json)

            # Check if we got valid JSON
            if ! echo "$WORKFLOWS" | jq empty 2>/dev/null; then
              echo "⚠️  Failed to get workflows from Terminus"
              echo "Response: $WORKFLOWS"
              sleep $SLEEP_TIME
              continue
            fi

            # Find most recent deploy workflow matching this commit
            # Terminus workflows include "Sync code" or "Deploy" workflows
            # We look for workflows with our commit SHA in the description/details
            DEPLOY_WORKFLOW=$(echo "$WORKFLOWS" | jq -r "
              [.[] | select(.workflow_type == \"sync_code\" or .workflow_type == \"deploy\")]
              | sort_by(.finished_at // .created_at)
              | reverse
              | .[0]
            ")

            if [ -z "$DEPLOY_WORKFLOW" ] || [ "$DEPLOY_WORKFLOW" == "null" ]; then
              echo "⏳ No deployment workflow found yet"
              sleep $SLEEP_TIME
              continue
            fi

            WORKFLOW_ID=$(echo "$DEPLOY_WORKFLOW" | jq -r '.id')
            WORKFLOW_STATUS=$(echo "$DEPLOY_WORKFLOW" | jq -r '.status')
            WORKFLOW_TYPE=$(echo "$DEPLOY_WORKFLOW" | jq -r '.workflow_type')
            WORKFLOW_DESC=$(echo "$DEPLOY_WORKFLOW" | jq -r '.description // ""')

            echo "Workflow ID: $WORKFLOW_ID"
            echo "Type: $WORKFLOW_TYPE"
            echo "Description: $WORKFLOW_DESC"
            echo "Status: $WORKFLOW_STATUS"

            # Terminus workflow statuses: succeeded, failed, running, queued
            if [ "$WORKFLOW_STATUS" == "succeeded" ]; then
              echo "✅ Deployment workflow succeeded"
              echo "deployment_ready=true" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$WORKFLOW_STATUS" == "failed" ]; then
              echo "❌ Deployment workflow failed"
              echo "deployment_ready=false" >> $GITHUB_OUTPUT
              exit 1
            elif [ "$WORKFLOW_STATUS" == "running" ] || [ "$WORKFLOW_STATUS" == "queued" ]; then
              echo "⏳ Workflow still processing (${WORKFLOW_STATUS})..."
            else
              echo "⏳ Workflow status: $WORKFLOW_STATUS"
            fi

            sleep $SLEEP_TIME
          done

          echo "❌ Timeout after 10 minutes"
          echo "deployment_ready=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Clear Pantheon cache
        run: |
          echo "Clearing Pantheon CDN cache for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."
          terminus env:clear-cache ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}
          echo "✅ Cache cleared successfully"

      - name: Run unit tests
        id: unit-tests
        continue-on-error: true
        run: npm test -- --run
        env:
          CI: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify Pantheon site is accessible
        run: |
          echo "Testing connectivity to: ${{ steps.env.outputs.base_url }}"
          echo "Waiting for site to be fully ready..."

          MAX_ATTEMPTS=12
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.env.outputs.base_url }}" || echo "000")

            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Site is accessible (HTTP $HTTP_CODE)"
              exit 0
            else
              echo "⏳ Site returned HTTP $HTTP_CODE, waiting..."
              sleep 5
            fi
          done

          echo "❌ Site not accessible after 60 seconds"
          exit 1

      - name: Run E2E tests against Pantheon
        id: e2e-tests
        continue-on-error: true
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Deploy Playwright report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}
          keep_files: true

      - name: Report status
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_id }}"

          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.env.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.wait.outputs.deployment_ready == 'true' && '✅ Ready' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests (Vitest):** ${{ steps.unit-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E Tests (Playwright):** ${{ steps.e2e-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Playwright Report](${REPORT_URL}) for detailed test results" >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if any tests failed
        if: steps.unit-tests.outcome != 'success' || steps.e2e-tests.outcome != 'success'
        run: exit 1
