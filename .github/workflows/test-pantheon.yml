name: Test on Pantheon

# GitHub Pages Setup Required:
# 1. Go to repository Settings → Pages
# 2. Set Source to "GitHub Actions"
# 3. Playwright reports will be available at:
#    https://{username}.github.io/{repo}/reports/{run_id}

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

permissions:
  contents: write  # Required for GitHub Pages deployment
  pages: write
  id-token: write

jobs:
  test:
    name: Test deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            ENV_NAME="pr-${PR_NUM}"
            BASE_URL="https://pr-${PR_NUM}-${PANTHEON_SITE_NAME}.pantheonsite.io"
          else
            ENV_NAME="dev"
            BASE_URL="https://dev-${PANTHEON_SITE_NAME}.pantheonsite.io"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

      - name: Setup PHP (required for Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install and authenticate Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Wait for Pantheon build and deployment to complete
        id: wait
        run: |
          echo "Waiting for Pantheon deployment to complete..."
          echo "Site: ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}"
          echo "URL: ${{ steps.env.outputs.base_url }}"

          # Get site UUID
          SITE_UUID=$(terminus site:info ${{ env.PANTHEON_SITE_NAME }} --field=id)
          echo "Site UUID: $SITE_UUID"

          # Exchange machine token for API session token
          SESSION_RESPONSE=$(curl -s -X POST https://api.pantheon.io/v0/authorize/machine-token \
            -H "Content-Type: application/json" \
            -d "{\"machine_token\": \"${{ secrets.PANTHEON_MACHINE_TOKEN }}\", \"client\": \"github-actions\"}")

          SESSION_TOKEN=$(echo "$SESSION_RESPONSE" | jq -r '.session')

          if [ -z "$SESSION_TOKEN" ] || [ "$SESSION_TOKEN" == "null" ]; then
            echo "❌ Failed to get API session token"
            echo "Response: $SESSION_RESPONSE"
            exit 1
          fi

          echo "✓ Authenticated with Pantheon API"

          # Get current commit SHA
          COMMIT_SHA="${{ github.sha }}"
          echo "Looking for build matching commit: $COMMIT_SHA"

          # Monitor Pantheon build status via Next.js-specific API
          # Max 10 minutes (builds can take up to 10 minutes per user feedback)
          MAX_ATTEMPTS=60
          SLEEP_TIME=10
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Check $ATTEMPT of $MAX_ATTEMPTS..."

            # Get build list for this environment (Next.js-specific endpoint)
            BUILDS_RESPONSE=$(curl -s "https://terminus.pantheon.io/api/sites/$SITE_UUID/environment/${{ steps.env.outputs.env_name }}/build/list?limit=5" \
              -H "X-Pantheon-Session: $SESSION_TOKEN")

            # Find build matching this commit SHA
            BUILD=$(echo "$BUILDS_RESPONSE" | jq -r ".[] | select(.commit == \"$COMMIT_SHA\")")

            if [ -z "$BUILD" ] || [ "$BUILD" == "null" ]; then
              echo "⏳ No build found yet for commit $COMMIT_SHA"
              sleep $SLEEP_TIME
              continue
            fi

            BUILD_ID=$(echo "$BUILD" | jq -r '.id')
            BUILD_STATUS=$(echo "$BUILD" | jq -r '.status')
            BUILD_COMMIT=$(echo "$BUILD" | jq -r '.commit')

            echo "Build ID: $BUILD_ID"
            echo "Commit: ${BUILD_COMMIT:0:7}"
            echo "Status: $BUILD_STATUS"

            if [ "$BUILD_STATUS" == "DEPLOYMENT_SUCCESS" ]; then
              echo "✅ Build and deployment successful"
              echo "deployment_ready=true" >> $GITHUB_OUTPUT
              exit 0
            elif [[ "$BUILD_STATUS" == *"FAILURE"* ]]; then
              echo "❌ Build or deployment failed"
              echo "Build ID: $BUILD_ID"
              echo "deployment_ready=false" >> $GITHUB_OUTPUT
              exit 1
            elif [[ "$BUILD_STATUS" == *"WORKING"* ]] || [[ "$BUILD_STATUS" == *"QUEUED"* ]] || [ "$BUILD_STATUS" == "BUILD_SUCCESS" ]; then
              echo "⏳ Still processing..."
            else
              echo "⏳ Status: $BUILD_STATUS"
            fi

            sleep $SLEEP_TIME
          done

          echo "❌ Timeout after 10 minutes"
          echo "deployment_ready=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clear Pantheon cache
        run: |
          echo "Clearing Pantheon CDN cache for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."
          terminus env:clear-cache ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}
          echo "✅ Cache cleared successfully"

      - name: Run unit tests
        id: unit-tests
        continue-on-error: true
        run: npm test -- --run
        env:
          CI: true

      - name: Run E2E tests against Pantheon
        id: e2e-tests
        continue-on-error: true
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Deploy Playwright report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}
          keep_files: true

      - name: Report status
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_id }}"

          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.env.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.wait.outputs.deployment_ready == 'true' && '✅ Ready' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests (Vitest):** ${{ steps.unit-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E Tests (Playwright):** ${{ steps.e2e-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Playwright Report](${REPORT_URL}) for detailed test results" >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if any tests failed
        if: steps.unit-tests.outcome != 'success' || steps.e2e-tests.outcome != 'success'
        run: exit 1
