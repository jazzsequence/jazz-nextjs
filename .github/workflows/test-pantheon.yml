name: Test on Pantheon

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

jobs:
  test:
    name: Test deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            ENV_NAME="pr-${PR_NUM}"
            BASE_URL="https://pr-${PR_NUM}-${PANTHEON_SITE_NAME}.pantheonsite.io"
          else
            ENV_NAME="dev"
            BASE_URL="https://dev-${PANTHEON_SITE_NAME}.pantheonsite.io"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

      - name: Setup PHP (required for Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install and authenticate Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Wait for Pantheon build and deployment to complete
        id: wait
        run: |
          echo "Waiting for Pantheon deployment to complete..."
          echo "Site: ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}"
          echo "URL: ${{ steps.env.outputs.base_url }}"

          # Get site UUID
          SITE_UUID=$(terminus site:info ${{ env.PANTHEON_SITE_NAME }} --field=id)
          echo "Site UUID: $SITE_UUID"

          # Exchange machine token for API session token
          SESSION_RESPONSE=$(curl -s -X POST https://api.pantheon.io/v0/authorize/machine-token \
            -H "Content-Type: application/json" \
            -d "{\"machine_token\": \"${{ secrets.PANTHEON_MACHINE_TOKEN }}\", \"client\": \"github-actions\"}")

          SESSION_TOKEN=$(echo "$SESSION_RESPONSE" | jq -r '.session')

          if [ -z "$SESSION_TOKEN" ] || [ "$SESSION_TOKEN" == "null" ]; then
            echo "❌ Failed to get API session token"
            echo "Response: $SESSION_RESPONSE"
            exit 1
          fi

          echo "✓ Authenticated with Pantheon API"

          # Record start time - only look for workflows created after this
          START_TIME=$(date +%s)
          echo "Start time: $START_TIME ($(date -r $START_TIME))"

          # Monitor Pantheon workflow status via API
          # Max 10 minutes (builds can take up to 10 minutes per user feedback)
          MAX_ATTEMPTS=60
          SLEEP_TIME=10
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Check $ATTEMPT of $MAX_ATTEMPTS..."

            # Get most recent workflow for this site
            WORKFLOWS_RESPONSE=$(curl -s https://api.pantheon.io/v0/sites/$SITE_UUID/workflows \
              -H "Authorization: Bearer $SESSION_TOKEN")

            # Get the most recent sync_code workflow for this environment
            # Filter for: type=sync_code, matching environment, created after start time
            LATEST_WORKFLOW=$(echo "$WORKFLOWS_RESPONSE" | jq -r \
              "map(select(.type == \"sync_code\" and .environment == \"${{ steps.env.outputs.env_name }}\" and .created_at >= $START_TIME)) | .[0]")

            if [ "$LATEST_WORKFLOW" == "null" ]; then
              echo "⏳ No sync_code workflow found yet for ${{ steps.env.outputs.env_name }}"
              sleep $SLEEP_TIME
              continue
            fi

            WORKFLOW_ID=$(echo "$LATEST_WORKFLOW" | jq -r '.id // "unknown"')
            WORKFLOW_STATUS=$(echo "$LATEST_WORKFLOW" | jq -r '.result // "unknown"')
            WORKFLOW_DESC=$(echo "$LATEST_WORKFLOW" | jq -r '.description // "unknown"')
            WORKFLOW_TYPE=$(echo "$LATEST_WORKFLOW" | jq -r '.type // "unknown"')

            echo "Workflow: $WORKFLOW_DESC (type: $WORKFLOW_TYPE)"
            echo "Status: $WORKFLOW_STATUS"

            if [ "$WORKFLOW_STATUS" == "succeeded" ]; then
              echo "✅ Deployment successful"
              echo "deployment_ready=true" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$WORKFLOW_STATUS" == "failed" ]; then
              echo "❌ Deployment failed"
              echo "Workflow ID: $WORKFLOW_ID"
              # Retrieve logs if available
              curl -s https://api.pantheon.io/v0/sites/$SITE_UUID/workflows/$WORKFLOW_ID/logs \
                -H "Authorization: Bearer $SESSION_TOKEN" || true
              echo "deployment_ready=false" >> $GITHUB_OUTPUT
              exit 1
            elif [ "$WORKFLOW_STATUS" == "running" ]; then
              echo "⏳ Still processing..."
            else
              echo "⏳ Status: $WORKFLOW_STATUS"
            fi

            sleep $SLEEP_TIME
          done

          echo "❌ Timeout after 10 minutes"
          echo "deployment_ready=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clear Pantheon cache
        run: |
          echo "Clearing Pantheon CDN cache for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."
          terminus env:clear-cache ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}
          echo "✅ Cache cleared successfully"

      - name: Run unit tests
        run: npm test -- --run
        env:
          CI: true

      - name: Run E2E tests against Pantheon
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CI: true

      - name: Report status
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.env.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.wait.outputs.deployment_ready == 'true' && '✅ Ready' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
