name: Test on Pantheon

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

jobs:
  test:
    name: Test deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            ENV_NAME="pr-${PR_NUM}"
            BASE_URL="https://pr-${PR_NUM}-${PANTHEON_SITE_NAME}.pantheonsite.io"
          else
            ENV_NAME="dev"
            BASE_URL="https://dev-${PANTHEON_SITE_NAME}.pantheonsite.io"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

      - name: Setup PHP (required for Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install and authenticate Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Install Terminus Node Logs Plugin
        run: |
          echo "Installing terminus-node-logs-plugin..."
          terminus self:plugin:install pantheon-systems/terminus-node-logs-plugin || echo "Plugin installation failed"
          echo "Installed plugins:"
          terminus self:plugin:list
          echo "Available node commands:"
          terminus list | grep node || echo "No node commands found"

      - name: Wait for Pantheon build and deployment to complete
        id: wait
        run: |
          echo "Waiting for Pantheon build and deployment for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."

          # Next.js sites use a two-phase process: BUILD then DEPLOYMENT
          # We must wait for BOTH phases to complete (not just BUILD_SUCCESS)
          # Reference: https://docs.pantheon.io/nextjs/architecture

          MAX_ATTEMPTS=60
          ATTEMPT=0
          SLEEP_TIME=10

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."

            # Get build list and show raw output for debugging
            echo "Fetching build status for: ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}"

            # Don't fail the whole script if terminus fails - capture output and check it
            set +e
            BUILD_JSON=$(terminus nbl ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --format=json 2>&1)
            TERMINUS_EXIT=$?
            set -e

            echo "Terminus exit code: $TERMINUS_EXIT"
            echo "Raw JSON response (first 500 chars):"
            echo "$BUILD_JSON" | head -c 500
            echo ""

            # If terminus failed, wait and retry
            if [ $TERMINUS_EXIT -ne 0 ]; then
              echo "⏳ Terminus command failed, waiting before retry..."
              sleep $SLEEP_TIME
              continue
            fi

            # Check if we got valid JSON
            if [ -z "$BUILD_JSON" ] || [ "$BUILD_JSON" = "{}" ]; then
              echo "⏳ No builds found yet, waiting..."
              sleep $SLEEP_TIME
              continue
            fi

            # Parse status from JSON
            BUILD_STATUS=$(echo "$BUILD_JSON" | jq -r 'to_entries | .[0].value.status // "UNKNOWN"')

            echo "Parsed build status: $BUILD_STATUS"

            if [ "$BUILD_STATUS" == "DEPLOYMENT_SUCCESS" ]; then
              echo "✅ Build and deployment succeeded"
              terminus nbl ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --limit=1
              echo "deployment_ready=true" >> $GITHUB_OUTPUT
              exit 0
            elif [[ "$BUILD_STATUS" == *"FAILURE"* ]]; then
              echo "❌ Build or deployment failed: $BUILD_STATUS"
              terminus nbl ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --limit=3
              echo "deployment_ready=false" >> $GITHUB_OUTPUT
              exit 1
            elif [[ "$BUILD_STATUS" == *"WORKING"* ]] || [[ "$BUILD_STATUS" == *"QUEUED"* ]] || [[ "$BUILD_STATUS" == "BUILD_SUCCESS" ]]; then
              echo "⏳ Still processing ($BUILD_STATUS)..."
            else
              echo "⏳ Waiting for build to start (status: $BUILD_STATUS)..."
            fi

            sleep $SLEEP_TIME
          done

          echo "❌ Timeout waiting for deployment to complete"
          terminus nbl ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --limit=3
          echo "deployment_ready=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clear Pantheon cache
        run: |
          echo "Clearing Pantheon CDN cache for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."
          terminus env:clear-cache ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}
          echo "✅ Cache cleared successfully"

      - name: Run unit tests
        run: npm test -- --run
        env:
          CI: true

      - name: Run E2E tests against Pantheon
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CI: true

      - name: Report status
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.env.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.wait.outputs.deployment_ready == 'true' && '✅ Ready' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
