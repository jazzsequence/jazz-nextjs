name: Test on Pantheon

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

jobs:
  test:
    name: Test deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            ENV_NAME="pr-${PR_NUM}"
            BASE_URL="https://pr-${PR_NUM}-${PANTHEON_SITE_NAME}.pantheonsite.io"
          else
            ENV_NAME="dev"
            BASE_URL="https://dev-${PANTHEON_SITE_NAME}.pantheonsite.io"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

      - name: Wait for Pantheon deployment
        id: wait
        run: |
          echo "Waiting for Pantheon to deploy to ${{ steps.env.outputs.env_name }}..."
          echo "Target URL: ${{ steps.env.outputs.base_url }}"

          MAX_ATTEMPTS=30
          ATTEMPT=0
          SLEEP_TIME=20

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."

            # Check if site responds with 200 and has expected content
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.env.outputs.base_url }}" || echo "000")

            if [ "$HTTP_CODE" == "200" ]; then
              # Site is up, check if it has the expected build timestamp or content
              CONTENT=$(curl -s "${{ steps.env.outputs.base_url }}" || echo "")

              # Check for Next.js or recent deployment marker
              if echo "$CONTENT" | grep -q "Jazz Next.js\|Next.js\|__next"; then
                echo "✅ Deployment detected (HTTP $HTTP_CODE)"
                echo "deployment_ready=true" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "⏳ Site responding but content not ready yet..."
              fi
            else
              echo "⏳ Site not ready (HTTP $HTTP_CODE)..."
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${SLEEP_TIME}s before retry..."
              sleep $SLEEP_TIME
            fi
          done

          echo "❌ Timeout waiting for deployment"
          echo "deployment_ready=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Install Terminus
        run: |
          mkdir -p $HOME/.terminus/plugins
          curl -L https://github.com/pantheon-systems/terminus/releases/download/3.6.3/terminus.phar --output terminus
          chmod +x terminus
          sudo mv terminus /usr/local/bin/terminus

      - name: Authenticate with Pantheon
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="${PANTHEON_MACHINE_TOKEN}"

      - name: Clear Pantheon cache
        run: |
          echo "Clearing Pantheon CDN cache for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."
          terminus env:clear-cache ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}
          echo "✅ Cache cleared successfully"

      - name: Run unit tests
        run: npm test -- --run
        env:
          CI: true

      - name: Run E2E tests against Pantheon
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
          CI: true

      - name: Report status
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.env.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.wait.outputs.deployment_ready == 'true' && '✅ Ready' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
