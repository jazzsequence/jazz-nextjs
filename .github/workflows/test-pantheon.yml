name: Test on Pantheon

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

jobs:
  test:
    name: Test deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            ENV_NAME="pr-${PR_NUM}"
            BASE_URL="https://pr-${PR_NUM}-${PANTHEON_SITE_NAME}.pantheonsite.io"
          else
            ENV_NAME="dev"
            BASE_URL="https://dev-${PANTHEON_SITE_NAME}.pantheonsite.io"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

      - name: Setup PHP (required for Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install and authenticate Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Wait for Pantheon build to complete
        id: wait
        run: |
          echo "Waiting for Pantheon build to complete for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."

          # Use terminus workflow:wait to wait for the build to complete
          # This waits for code sync/deploy workflows automatically
          if terminus workflow:wait ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --max=600; then
            echo "✅ Build workflow succeeded"
            terminus workflow:list ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --format=table | head -5
            echo "deployment_ready=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Build workflow failed or timed out"
            terminus workflow:list ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }} --format=table
            echo "deployment_ready=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clear Pantheon cache
        run: |
          echo "Clearing Pantheon CDN cache for ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}..."
          terminus env:clear-cache ${{ env.PANTHEON_SITE_NAME }}.${{ steps.env.outputs.env_name }}
          echo "✅ Cache cleared successfully"

      - name: Run unit tests
        run: npm test -- --run
        env:
          CI: true

      - name: Run E2E tests against Pantheon
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CI: true

      - name: Report status
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.env.outputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.wait.outputs.deployment_ready == 'true' && '✅ Ready' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
