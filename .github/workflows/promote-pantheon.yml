name: Promote to Pantheon Environment

# Triggered when code is merged/pushed to the test or live branches.
# Creates the appropriate Pantheon tag, which the Pantheon GitHub App
# uses to trigger a build and deploy to that environment.
#
# Tag naming convention (required by Pantheon):
#   pantheon_test_N  →  Test environment
#   pantheon_live_N  →  Live environment
#
# Branches:
#   test  →  equivalent to Pantheon Test environment
#   live  →  equivalent to Pantheon Live environment
#   main  →  equivalent to Pantheon Dev (handled by test-pantheon.yml)

on:
  push:
    branches:
      - test
      - live

permissions:
  contents: write  # Required to create and push tags

env:
  PANTHEON_SITE_NAME: jazz-nextjs15

jobs:
  promote:
    name: Tag for Pantheon ${{ github.ref_name }} environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full tag history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine next tag
        id: tag
        run: |
          BRANCH="${{ github.ref_name }}"

          if [[ "$BRANCH" == "test" ]]; then
            PREFIX="pantheon_test"
          elif [[ "$BRANCH" == "live" ]]; then
            PREFIX="pantheon_live"
          else
            echo "Unexpected branch: $BRANCH" && exit 1
          fi

          LAST_TAG=$(git tag -l "${PREFIX}_*" | sort -t_ -k3 -n | tail -1)
          LAST=$(echo "${LAST_TAG}" | grep -o '[0-9]*$' || echo "0")
          NEXT=$(( LAST + 1 ))
          TAG="${PREFIX}_${NEXT}"

          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"       >> $GITHUB_OUTPUT
          echo "env=${BRANCH}"    >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"
          echo "✅ Pushed tag ${{ steps.tag.outputs.tag }} — Pantheon will now build and deploy to ${{ steps.tag.outputs.env }}"

      - name: Wait for Pantheon build and deployment to complete
        run: |
          SITE="${{ env.PANTHEON_SITE_NAME }}"
          ENV="${{ steps.tag.outputs.env }}"
          COMMIT_SHA="${{ github.sha }}"

          echo "Waiting for Pantheon deployment..."
          echo "Site: ${SITE}.${ENV}"
          echo "Commit: ${COMMIT_SHA:0:7}"

          # Exchange machine token for session token (curl + jq only — no Terminus needed)
          SESSION_RESPONSE=$(curl -s -X POST https://api.pantheon.io/v0/authorize/machine-token \
            -H "Content-Type: application/json" \
            -d "{\"machine_token\": \"${{ secrets.PANTHEON_MACHINE_TOKEN }}\", \"client\": \"github-actions\"}")

          SESSION_TOKEN=$(echo "$SESSION_RESPONSE" | jq -r '.session')

          if [ -z "$SESSION_TOKEN" ] || [ "$SESSION_TOKEN" == "null" ]; then
            echo "❌ Failed to get API session token"
            exit 1
          fi

          SITE_UUID="${{ secrets.SITE_UUID }}"

          MAX_ATTEMPTS=60
          SLEEP_TIME=10
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Check $ATTEMPT of $MAX_ATTEMPTS..."

            BUILDS_RESPONSE=$(curl -s \
              -H "X-Pantheon-Session: $SESSION_TOKEN" \
              "https://terminus.pantheon.io/api/sites/$SITE_UUID/environment/${ENV}/build/list?limit=10")

            if ! echo "$BUILDS_RESPONSE" | jq empty 2>/dev/null; then
              sleep $SLEEP_TIME
              continue
            fi

            BUILD=$(echo "$BUILDS_RESPONSE" | jq -r ".[] | select(.commit == \"$COMMIT_SHA\")")

            if [ -z "$BUILD" ] || [ "$BUILD" == "null" ]; then
              echo "⏳ No build found yet for commit ${COMMIT_SHA:0:7}"
              sleep $SLEEP_TIME
              continue
            fi

            BUILD_STATUS=$(echo "$BUILD" | jq -r '.status')
            echo "Status: $BUILD_STATUS"

            if [ "$BUILD_STATUS" == "DEPLOYMENT_SUCCESS" ] || [ "$BUILD_STATUS" == "BUILD_SUCCESS" ]; then
              echo "✅ Deployment successful"
              break
            elif [[ "$BUILD_STATUS" == *"FAILURE"* ]]; then
              echo "❌ Build or deployment failed (status: $BUILD_STATUS)"
              exit 1
            fi

            sleep $SLEEP_TIME
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Timeout after 10 minutes"
            exit 1
          fi

          # Clear Pantheon GCDN cache — same as 'terminus env:clear-cache'.
          # A code deployment changes rendered HTML; without this, Fastly serves
          # stale content for up to a year (the Surrogate-Control TTL).
          # Uses api.pantheon.io/v0 (public Swagger-documented API) with
          # Authorization: Bearer — tested and confirmed working.
          echo "Clearing Pantheon GCDN cache for ${SITE}.${ENV}..."
          CLEAR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $SESSION_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"clear_cache"}' \
            "https://api.pantheon.io/v0/sites/$SITE_UUID/environments/${ENV}/workflows")
          CLEAR_ID=$(echo "$CLEAR_RESPONSE" | jq -r '.id // empty')
          if [ -n "$CLEAR_ID" ]; then
            echo "✅ Cache clear workflow dispatched (id: $CLEAR_ID)"
            # Poll GET /v0/sites/{id}/workflows/{workflow_id} until terminal result.
            # result values per Swagger: "succeeded", "failed", "running" (null = queued)
            CLEAR_ATTEMPT=0
            CLEAR_MAX=30
            while [ $CLEAR_ATTEMPT -lt $CLEAR_MAX ]; do
              CLEAR_ATTEMPT=$((CLEAR_ATTEMPT + 1))
              sleep 5
              STATUS=$(curl -s \
                -H "Authorization: Bearer $SESSION_TOKEN" \
                "https://api.pantheon.io/v0/sites/$SITE_UUID/workflows/$CLEAR_ID" \
                | jq -r '.result // empty')
              echo "  Cache clear status: ${STATUS:-pending}"
              if [ "$STATUS" = "succeeded" ]; then
                echo "✅ Cache cleared"
                break
              elif [ "$STATUS" = "failed" ]; then
                echo "⚠️  Cache clear failed — proceeding anyway"
                break
              fi
            done
            if [ $CLEAR_ATTEMPT -eq $CLEAR_MAX ]; then
              echo "⚠️  Cache clear polling timed out after 2.5 min — proceeding anyway"
            fi
          else
            echo "⚠️  Cache clear dispatch failed: $CLEAR_RESPONSE"
          fi

      - name: Warm ISR cache
        continue-on-error: true  # Cold starts can exceed any reasonable timeout — not a deployment failure
        run: |
          SITE="${{ env.PANTHEON_SITE_NAME }}"
          ENV="${{ steps.tag.outputs.env }}"
          BASE_URL="https://${ENV}-${SITE}.pantheonsite.io"

          echo "Warming ISR cache for ${BASE_URL}..."

          # Warm key pages — fires SSR on first hit, populating ISR cache.
          # Cold starts after deployment can be slow; failures here are non-fatal.
          for path in "/" "/posts" "/games" "/media" "/opengraph-image"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "${BASE_URL}${path}")
            echo "  ${path} → ${STATUS}"
          done

          echo "Cache warm complete."

      - name: Summary
        run: |
          echo "### Pantheon Promotion" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pantheon env** | ${{ steps.tag.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SITE="${{ env.PANTHEON_SITE_NAME }}"
          ENV="${{ steps.tag.outputs.env }}"
          echo "🔗 [https://${ENV}-${SITE}.pantheonsite.io](https://${ENV}-${SITE}.pantheonsite.io)" >> $GITHUB_STEP_SUMMARY
